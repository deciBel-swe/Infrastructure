name: Update Manifests from App CI

on:
  repository_dispatch:
    types: [update-image-tag]

permissions:
  contents: write 

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Update Image Tag
        run: |
          APP_NAME="${{ github.event.client_payload.app }}"           # "frontend" or "backend"
          NEW_VERSION="${{ github.event.client_payload.version }}"    # version string         
          
          TARGET_FILE="k8s-manifests/${APP_NAME}.yaml"
          TARGET_BRANCH="${{ github.event.client_payload.environment == 'prod' && 'main' || 'dev' }}"
          
          echo "Updating $APP_NAME to $NEW_VERSION file $TARGET_FILE in branch $TARGET_BRANCH"
          
          git checkout "$TARGET_BRANCH"

          sed -i "s|image: ghcr.io/decibel-swe/${APP_NAME}:.*|image: ghcr.io/decibel-swe/${APP_NAME}:${NEW_VERSION}|g" $TARGET_FILE

          AUTHOR_NAME="${{ github.event.client_payload.author }}"
          AUTHOR_ID="${{ github.event.client_payload.author_id }}"

          git config user.name "$AUTHOR_NAME"
          git config user.email "${AUTHOR_ID}+${AUTHOR_NAME}@users.noreply.github.com"
          
          git add "$TARGET_FILE"
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "bump: ${APP_NAME} to ${NEW_VERSION}"
            git push origin "$TARGET_BRANCH"
          fi