apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: decibel-dev-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/decibel-swe/infrastructure.git
    targetRevision: dev
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - createnamespace=true
    automated:
      selfHeal: true 
      prune: true

