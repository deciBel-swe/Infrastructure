alertmanager:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-issuer"
      
    hosts:
      - alertmanager.decibel.foo
    paths:
      - /
    tls:
      - secretName: alertmanager-tls-secret
        hosts:
          - alertmanager.decibel.foo

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 3d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 3Gi

grafana:
  enabled: true
  admin:
    existingSecret: prometheus-secret
    userKey: PROMETHEUS_ADMIN_USER
    passwordKey: PROMETHEUS_ADMIN_PASSWORD
  
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-issuer"
    hosts:
      - grafana.decibel.foo
    path: /
    tls:
      - secretName: grafana-tls-secret
        hosts:
          - grafana.decibel.foo