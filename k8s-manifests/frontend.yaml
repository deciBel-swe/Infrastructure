apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: ghcr-registry-secret
      containers:
      - name: frontend
        image: ghcr.io/decibel-swe/frontend:v0.47.19
        imagePullPolicy: Always
        # resources:
        #   limits:
        #     memory: "128Mi"
        #     cpu: "500m"
        env: 
        - name: RECAPTCHA_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: frontend-secret
              key: RECAPTCHA_SECRET_KEY
        envFrom:
          - configMapRef:
              name: frontend-configmap
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
