apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 82.18.0 
      helm:
        valueFiles:
          - $root/k8s-config/prometheus/values.yaml 
    - repoURL: https://github.com/deciBel-swe/infrastructure.git
      targetRevision: dev
      ref: root
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: decibel-backend-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack 
spec:
  selector:
    matchLabels:
      app: backend-service
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /api/actuator/prometheus
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack 
spec:
  selector:
    matchLabels:
      app: postgres-service
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: metrics
      interval: 15s